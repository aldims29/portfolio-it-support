<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FixLab IT Support</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:white;
}

/* ANIMASI */
.fade-up{
  opacity:0;
  transform:translateY(30px);
  transition:0.8s;
}
.fade-up.show{
  opacity:1;
  transform:translateY(0);
}

/* HEADER */
header{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#0f172a,#020617);
}
h1{
  font-size:2.5em;
  color:#38bdf8;
}

/* BUTTON */
.btn{
  background:#38bdf8;
  padding:12px 20px;
  border-radius:10px;
  color:black;
  text-decoration:none;
  display:inline-block;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.1);
}

/* SECTION */
.section{
  padding:50px 20px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

/* GALERI */
.gallery img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}
.gallery img:hover{
  transform:scale(1.05);
}

/* VIDEO */
video{
  width:100%;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<header class="fade-up">
  <h1>FixLab IT Support</h1>
  <p>Jasa IT Support Cepat & Terpercaya 🔧</p>
  <br>
